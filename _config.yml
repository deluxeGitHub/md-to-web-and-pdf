title: "Spielordnung"
description: "Spielordnung des BTFV"
plugins:
  - jekyll-toc
  - jekyll-relative-links

defaults:
  - scope:
      path: ""
    values:
      layout: default
      template: base

relative_links:
  enabled: true

exclude:
  - scripts/
  - temp/
  - test/fixtures/
  - build.sh
  - generate_pdf_local.sh
  - README.md
