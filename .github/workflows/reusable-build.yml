name: Reusable PDF & Pages Build

on:
  workflow_call:
    inputs:
      source_dir:
        description: 'Verzeichnis mit Markdown-Dateien'
        default: 'docs'
        type: string
      framework_ref:
        description: 'Branch oder Tag von md-to-web-and-pdf'
        default: 'main'
        type: string
      baseurl:
        description: 'Jekyll baseurl (z.B. /docs-testrepo für GitHub Pages project pages)'
        default: ''
        type: string
      staging_branch:
        description: 'Branch der als Staging deployt wird (leer = kein Staging-Deploy)'
        default: 'staging'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Docs-Repo in den Workspace-Root auschecken (damit JamesIves .git findet)
      - name: Checkout Docs-Repo
        uses: actions/checkout@v4

      # Framework in .framework/ auschecken (versteckter Ordner, wird nicht committet)
      - name: Checkout Framework (md-to-web-and-pdf)
        uses: actions/checkout@v4
        with:
          repository: deluxeGitHub/md-to-web-and-pdf
          ref: ${{ inputs.framework_ref }}
          path: .framework

      - name: Framework-Dateien in Workspace übernehmen
        run: |
          # Framework-Dateien kopieren, ohne lokale Overrides im Docs-Repo zu überschreiben
          cp -rn .framework/scripts/.          scripts/             2>/dev/null || cp -r .framework/scripts    scripts
          cp -rn .framework/templates/.        templates/           2>/dev/null || cp -r .framework/templates  templates
          cp -rn .framework/_layouts/.         _layouts/            2>/dev/null || cp -r .framework/_layouts   _layouts
          cp -rn .framework/_includes/.        _includes/           2>/dev/null || cp -r .framework/_includes  _includes
          cp -n  .framework/manifest.webmanifest manifest.webmanifest 2>/dev/null || true

      - name: Letztes Commit-Datum ermitteln
        run: |
          DATE=$(git log -1 --format=%cd --date=short)
          echo "BUILD_DATE=$(date -d "$DATE" +%d.%m.%Y)" >> "$GITHUB_ENV"

      - name: Prüfen ob Neugenerierung nötig ist
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild: manuell ausgelöst"
            exit 0
          fi
          MISSING=0
          while IFS= read -r -d '' md; do
            name="$(basename "${md%.md}")"
            [[ ! -f "assets/pdf/${name}.pdf" ]] && MISSING=$((MISSING + 1))
          done < <(find "${{ inputs.source_dir }}" -name "*.md" -print0)
          if [[ $MISSING -gt 0 ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild: $MISSING fehlende PDF(s)"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            "${{ inputs.source_dir }}/" \
            'templates/*/pdf-header.tex' \
            scripts/generate_pdfs.sh \
            _config.yml 2>/dev/null || true)
          if [[ -n "$CHANGED" ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild nötig – geänderte Dateien:"
            echo "$CHANGED"
          else
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
            echo "Keine relevanten Änderungen – Build wird übersprungen."
          fi

      - name: Install Pandoc und LaTeX
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-plain-generic \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            fonts-texgyre \
            lmodern \
            poppler-utils
          fc-cache -fv

      - name: PDFs generieren
        if: steps.check.outputs.needs_rebuild == 'true'
        run: bash scripts/generate_pdfs.sh "$BUILD_DATE" "${{ inputs.source_dir }}"

      - name: PDFs committen
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -f assets/pdf/
          git diff --cached --quiet || git commit -m "Update PDF versions"
          git pull --rebase origin "$(git rev-parse --abbrev-ref HEAD)"
          git push origin HEAD

      - name: Ruby und Jekyll einrichten
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Jekyll installieren
        run: gem install jekyll jekyll-toc jekyll-relative-links

      - name: Baseurl und Deploy-Ziel ermitteln
        id: pages
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "baseurl=${{ inputs.baseurl }}"  >> "$GITHUB_OUTPUT"
            echo "target=."                        >> "$GITHUB_OUTPUT"
            echo "clean_exclude=staging"           >> "$GITHUB_OUTPUT"
            echo "deploy=true"                     >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.staging_branch }}" && "${{ github.ref }}" == "refs/heads/${{ inputs.staging_branch }}" ]]; then
            echo "baseurl=${{ inputs.baseurl }}/staging" >> "$GITHUB_OUTPUT"
            echo "target=staging"                         >> "$GITHUB_OUTPUT"
            echo "clean_exclude="                         >> "$GITHUB_OUTPUT"
            echo "deploy=true"                            >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Kein Deploy für Branch ${{ github.ref_name }}"
          fi

      - name: Jekyll-Site bauen
        if: steps.pages.outputs.deploy == 'true'
        run: jekyll build --destination _site --baseurl "${{ steps.pages.outputs.baseurl }}"

      - name: Auf GitHub Pages deployen
        if: steps.pages.outputs.deploy == 'true'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          target-folder: ${{ steps.pages.outputs.target }}
          clean: true
          clean-exclude: ${{ steps.pages.outputs.clean_exclude }}
