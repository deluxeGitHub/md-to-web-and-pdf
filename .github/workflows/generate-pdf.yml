name: Generate PDF

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get last commit date (DD.MM.YYYY)
        run: |
          LAST_COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          LAST_COMMIT_DATE_DE=$(date -d "$LAST_COMMIT_DATE" +%d.%m.%Y)
          echo "BUILD_DATE=$LAST_COMMIT_DATE_DE" >> "$GITHUB_ENV"

      - name: Install Pandoc and LaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-plain-generic \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            fonts-texgyre \
            lmodern
          fc-cache -fv

      - name: Generate PDFs
        run: bash scripts/generate_pdfs.sh "$BUILD_DATE"

      - name: Run tests
        run: bash scripts/test_pdfs.sh

      - name: Commit PDFs to repository
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add assets/pdf/
          git diff --cached --quiet || git commit -m "Update PDF versions"
          git push origin HEAD
