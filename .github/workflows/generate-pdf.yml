name: Generate PDF

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get last commit date (DD.MM.YYYY)
        run: |
          LAST_COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          LAST_COMMIT_DATE_DE=$(date -d "$LAST_COMMIT_DATE" +%d.%m.%Y)
          echo "BUILD_DATE=$LAST_COMMIT_DATE_DE" >> "$GITHUB_ENV"

      - name: Prüfen ob Neugenerierung nötig ist
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild: manuell ausgelöst (workflow_dispatch)"
            exit 0
          fi
          # Fehlende PDFs → immer neu bauen
          MISSING=0
          while IFS= read -r -d '' md; do
            name="$(basename "${md%.md}")"
            [[ ! -f "assets/pdf/${name}.pdf" ]] && MISSING=$((MISSING + 1))
          done < <(find docs -name "*.md" -print0)
          if [[ $MISSING -gt 0 ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild: $MISSING fehlende PDF(s)"
            exit 0
          fi
          # Relevante Dateiänderungen seit letztem Commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            docs/ \
            'templates/*/pdf-header.tex' \
            scripts/generate_pdfs.sh \
            2>/dev/null || true)
          if [[ -n "$CHANGED" ]]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild nötig – geänderte Dateien:"
            echo "$CHANGED"
          else
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
            echo "Keine relevanten Änderungen – Build wird übersprungen."
          fi

      - name: Install Pandoc and LaTeX
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-latex-extra \
            texlive-plain-generic \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            fonts-texgyre \
            lmodern \
            poppler-utils
          fc-cache -fv

      - name: Generate PDFs
        if: steps.check.outputs.needs_rebuild == 'true'
        run: bash scripts/generate_pdfs.sh "$BUILD_DATE"

      - name: Run tests
        if: steps.check.outputs.needs_rebuild == 'true'
        run: bash scripts/test_pdfs.sh

      - name: Commit PDFs to repository
        if: steps.check.outputs.needs_rebuild == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -f assets/pdf/
          git diff --cached --quiet || git commit -m "Update PDF versions"
          git push origin HEAD
